<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top 10 Attractions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      color: #2d3748;
    }

    header {
      background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
      color: white;
      padding: 48px 20px 40px;
      text-align: center;
    }

    header h1 {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    header p {
      opacity: 0.65;
      font-size: 1rem;
    }

    .search-bar {
      background: white;
      padding: 28px 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .search-inner {
      max-width: 580px;
      margin: 0 auto;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 13px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #4299e1; }

    button {
      padding: 13px 26px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #3182ce; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    main {
      max-width: 1440px;
      margin: 40px auto;
      padding: 0 24px 60px;
    }

    .loading {
      text-align: center;
      padding: 70px 20px;
      color: #718096;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #e2e8f0;
      border-top-color: #4299e1;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 18px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
    .loading-sub { font-size: 0.88rem; opacity: 0.7; }

    .results-heading {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.13);
    }

    .card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: #e2e8f0;
    }

    .card-header {
      padding: 16px 16px 14px;
      color: white;
    }

    .rank-label {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.8;
      margin-bottom: 5px;
    }

    .attraction-name {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .card-body {
      padding: 14px 16px 16px;
      flex: 1;
    }

    .card-body p {
      font-size: 0.82rem;
      line-height: 1.65;
      color: #4a5568;
    }

    .card-body p + p { margin-top: 10px; }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      padding: 16px 20px;
      border-radius: 8px;
      margin-top: 24px;
      font-size: 0.95rem;
    }

    .hidden { display: none; }

    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 720px)  { .grid { grid-template-columns: repeat(2, 1fr); } header h1 { font-size: 1.9rem; } }
    @media (max-width: 460px)  { .grid { grid-template-columns: 1fr; } .input-row { flex-direction: column; } }
  </style>
</head>
<body>

<header>
  <h1>Top 10 Attractions</h1>
  <p>Discover the best places to visit anywhere in the world</p>
</header>

<div class="search-bar">
  <div class="search-inner">
    <label for="location">Location</label>
    <div class="input-row">
      <input type="text" id="location" placeholder="e.g. Paris, Tokyo, New York..." autocomplete="off">
      <button id="searchBtn" onclick="search()">Explore</button>
    </div>
  </div>
</div>

<main>
  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <div class="loading-title">Researching top attractions in <span id="loadingCity"></span>…</div>
    <div class="loading-sub">Consulting multiple sources across the web</div>
  </div>

  <div id="errorBox" class="error-box hidden"></div>

  <div id="results" class="hidden">
    <h2 class="results-heading" id="resultsHeading"></h2>
    <div class="grid" id="grid"></div>
  </div>
</main>

<script>
  const CARD_GRADIENTS = [
    ['#63b3ed', '#2b6cb0'],
    ['#68d391', '#276749'],
    ['#f6ad55', '#c05621'],
    ['#b794f4', '#553c9a'],
    ['#fc8181', '#9b2c2c'],
    ['#76e4f7', '#086f83'],
    ['#fbd38d', '#975a16'],
    ['#9ae6b4', '#22543d'],
    ['#fbb6ce', '#97266d'],
    ['#a3bffa', '#434190'],
  ];

  document.getElementById('location').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  async function search() {
    const location = document.getElementById('location').value.trim();
    if (!location) { document.getElementById('location').focus(); return; }

    const btn      = document.getElementById('searchBtn');
    const loading  = document.getElementById('loading');
    const errorBox = document.getElementById('errorBox');
    const results  = document.getElementById('results');

    btn.disabled = true;
    loading.classList.remove('hidden');
    errorBox.classList.add('hidden');
    results.classList.add('hidden');
    document.getElementById('loadingCity').textContent = location;

    try {
      const res  = await fetch('/api/attractions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ location })
      });
      const data = await res.json();

      if (!res.ok || data.error) throw new Error(data.error || 'Failed to fetch attractions');

      await render(location, data.attractions);
    } catch (err) {
      errorBox.textContent = `Error: ${err.message}`;
      errorBox.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      loading.classList.add('hidden');
    }
  }

  const UNSPLASH_KEY = 'K5QMg6YbGT1MG_qSotIJzU-6J-A6mNCSPW09OUqk_so';

  async function getUnsplashImage(searchTerm) {
    try {
      const encoded = encodeURIComponent(searchTerm);
      const res = await fetch(
        `https://api.unsplash.com/search/photos?query=${encoded}&per_page=1&orientation=landscape`,
        { headers: { 'Authorization': `Client-ID ${UNSPLASH_KEY}` } }
      );
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        return data.results[0].urls.regular;
      }
    } catch (e) {}
    // Fallback to picsum if unsplash fails
    return `https://picsum.photos/seed/${encodeURIComponent(searchTerm)}/400/300`;
  }

  async function render(location, attractions) {
    document.getElementById('resultsHeading').textContent = `Top 10 Attractions in ${location}`;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (let i = 0; i < attractions.length; i++) {
      const a = attractions[i];
      const [c1, c2] = CARD_GRADIENTS[i % CARD_GRADIENTS.length];
      const card = document.createElement('div');
      card.className = 'card';

      // Fetch image from Unsplash in the browser
      const imageUrl = await getUnsplashImage(a.image_search || a.name);

      card.innerHTML = `
        <img class="card-img" src="${imageUrl}" alt="${esc(a.name)}" loading="lazy" onerror="this.style.display='none'">
        <div class="card-header" style="background: linear-gradient(135deg, ${c1} 0%, ${c2} 100%)">
          <div class="rank-label"># ${a.rank}</div>
          <div class="attraction-name">${esc(a.name)}</div>
        </div>
        <div class="card-body">
          <p>${esc(a.description)}</p>
        </div>
      `;
      grid.appendChild(card);
    }

    const resultsEl = document.getElementById('results');
    resultsEl.classList.remove('hidden');
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
</script>

</body>
</html>
